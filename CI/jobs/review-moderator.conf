# jobs/review-moderator.conf
# Auto-moderates pending reviews that carry an order-proof URL: fetches the
# exchange's order page/API, and on a confirmed COMPLETED swap approves the
# review (+ valid-order / money-band tags); terminal failures are rejected;
# everything uncertain is flagged for a human.
#
# PROJECT_SOURCE_PATH is relative to deploy-jobs.sh (which lives in CI/),
# so it starts with ../ to climb out of CI/ into the repo source tree.

PROJECT_SOURCE_PATH="../src/DirectoryManager/DirectoryManager.ReviewModerator"
DLL_NAME="DirectoryManager.ReviewModerator.dll"

# Every 15 minutes (at :00, :15, :30, :45 of every hour)
ON_CALENDAR="*-*-* *:00/15:00 UTC"
SCHEDULE_DESCRIPTION="Every 15 minutes"

# Capabilities:
# - NEEDS_EMAIL=0: it only reads/writes the DB, sends no mail.
# - NEEDS_TOR=1:   routes .onion proof URLs through the local Tor SOCKS proxy,
#                  and (same as site-checker) this is what makes deploy-jobs.sh
#                  inject TorProxy:Host/Port + UserAgent:Header, both of which
#                  the fetcher uses. Clearnet proof pages still go direct.
NEEDS_EMAIL=0
NEEDS_TOR=1

# Bound the run well under the 15-minute cadence so a slow pass can never
# overlap the next trigger. It only processes the small set of pending,
# order-URL reviews, so this is generous.
MAX_RUNTIME="10min"

# Optional overrides (defaults are fine if you used the web deploy --task tor):
# TOR_SOCKS_HOST="127.0.0.1"
# TOR_SOCKS_PORT="9050"
