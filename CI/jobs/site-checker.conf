# jobs/site-checker.conf
# Verifies that listed sites still respond. Routes through the local Tor
# SOCKS proxy so that .onion listings can be checked AND so clearnet checks
# don't hammer the server's IP from a single source.

PROJECT_SOURCE_PATH="../src/DirectoryManager/DirectoryManager.SiteChecker"
DLL_NAME="DirectoryManager.SiteChecker.dll"

# Weekly: Tuesdays at 12:15 UTC
ON_CALENDAR="Tue *-*-* 12:15:00 UTC"
SCHEDULE_DESCRIPTION="Weekly, Tuesdays at 12:15 UTC"

NEEDS_EMAIL=0
NEEDS_TOR=1

# Whole-directory sweep can take a while — onion sites are slow.
MAX_RUNTIME="3h"

# Optional override (defaults are fine if you used the web deploy --task tor):
# TOR_SOCKS_HOST="127.0.0.1"
# TOR_SOCKS_PORT="9050"
