# jobs/sponsored-listing-opening.conf
# Notifies subscribers when sponsored-listing slots open. Frequent cadence
# because slots are time-sensitive and high-value.

PROJECT_SOURCE_PATH="../src/DirectoryManager/DirectoryManager.SponsoredListingOpening"
DLL_NAME="DirectoryManager.SponsoredListingOpening.dll"

# Every 30 minutes (at :00 and :30 of every hour)
ON_CALENDAR="*-*-* *:00/30:00 UTC"
SCHEDULE_DESCRIPTION="Every 30 minutes"

NEEDS_EMAIL=1
NEEDS_TOR=0

# Should finish fast — just a check + a few mails.
MAX_RUNTIME="15min"
