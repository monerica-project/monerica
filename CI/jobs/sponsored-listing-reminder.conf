# jobs/sponsored-listing-reminder.conf
# Reminds sponsors of expiring listings.

PROJECT_SOURCE_PATH="../src/DirectoryManager/DirectoryManager.SponsoredListingReminder"
DLL_NAME="DirectoryManager.SponsoredListingReminder.dll"

# Every 3 hours, on the hour: 00:00, 03:00, 06:00, 09:00, 12:00, 15:00, 18:00, 21:00 UTC
ON_CALENDAR="*-*-* 00/3:00:00 UTC"
SCHEDULE_DESCRIPTION="Every 3 hours (00:00, 03:00, ... 21:00 UTC)"

NEEDS_EMAIL=1
NEEDS_TOR=0

MAX_RUNTIME="20min"
