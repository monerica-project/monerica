# jobs/email-message-maker.conf
# Generates the email messages that NewsletterSender will later mail out.
# Runs once per day, well before NewsletterSender's hourly cycle picks them up.
#
# PROJECT_SOURCE_PATH is relative to deploy-jobs.sh (which lives in CI/),
# so paths start with ../ to climb out of CI/ into the repo source tree.

PROJECT_SOURCE_PATH="../src/DirectoryManager/DirectoryManager.EmailMessageMaker"
DLL_NAME="DirectoryManager.EmailMessageMaker.dll"

# Daily at 02:15 UTC
ON_CALENDAR="*-*-* 02:15:00 UTC"
SCHEDULE_DESCRIPTION="Daily at 02:15 UTC"

# Capabilities — DB only, no email/tor needed (it just writes messages to DB)
NEEDS_EMAIL=0
NEEDS_TOR=0

# Builds messages over the whole subscriber base; give it room.
MAX_RUNTIME="1h"
