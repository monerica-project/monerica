# jobs/newsletter-sender.conf
# Drains the queue of email messages prepared by EmailMessageMaker.
# Hourly cadence keeps SMTP rate-limited senders happy.

PROJECT_SOURCE_PATH="../src/DirectoryManager/DirectoryManager.NewsletterSender"
DLL_NAME="DirectoryManager.NewsletterSender.dll"

# Every hour on the hour
ON_CALENDAR="*-*-* *:00:00 UTC"
SCHEDULE_DESCRIPTION="Hourly at :00 UTC"

NEEDS_EMAIL=1
NEEDS_TOR=0

# Bounded by SMTP throughput, not work size — 30 min is plenty.
MAX_RUNTIME="30min"
